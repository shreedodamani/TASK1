service: email-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.9
  stage: dev
  region: us-east-1
  environment:
    SMTP_HOST: ${env:SMTP_HOST, '127.0.0.1'}
    SMTP_PORT: ${env:SMTP_PORT, '1025'}
    SMTP_USER: ${env:SMTP_USER, ''}
    SMTP_PASSWORD: ${env:SMTP_PASSWORD, ''}
    SENDER_EMAIL: ${env:SENDER_EMAIL, 'noreply@minihms.com'}

plugins:
  - serverless-offline

functions:
  sendEmail:
    handler: handler.send_email
    events:
      - http:
          path: send-email
          method: post
